services:
  api:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  bot:
    build: ./bot
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./bot:/app
    depends_on:
      - api

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api
