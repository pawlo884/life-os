services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file:
      - .env
    environment:
      # Hardcoded for local Docker — avoids host-shell DATABASE_URL override
      DATABASE_URL: postgresql+asyncpg://lifeos:lifeos@db:5432/lifeos
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      api:
        condition: service_healthy

  bot:
    profiles: ["discord"]
    build: ./bot
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000/api/v1
    volumes:
      - ./bot:/app
    depends_on:
      api:
        condition: service_healthy

  seed:
    profiles: ["seed"]
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lifeos:lifeos@db:5432/lifeos
    volumes:
      - ./backend:/app
    depends_on:
      api:
        condition: service_healthy
    command: ["python", "-m", "scripts.seed"]
    restart: "no"

volumes:
  postgres_data:
  frontend_node_modules:
