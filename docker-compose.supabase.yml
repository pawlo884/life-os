# Supabase override — cloud Postgres instead of local db container:
#   docker compose -f docker-compose.yml -f docker-compose.supabase.yml up -d
services:
  api:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: !reset []

  seed:
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: !reset []

  db:
    profiles: ["local-db"]
