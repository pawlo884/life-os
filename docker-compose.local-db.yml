# Optional local Postgres (when not using Supabase)
# Run: docker compose -f docker-compose.yml -f docker-compose.local-db.yml up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/backup:/backup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    environment:
      DATABASE_URL: postgresql+asyncpg://lifeos:lifeos@db:5432/lifeos
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
